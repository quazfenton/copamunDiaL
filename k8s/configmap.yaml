apiVersion: v1
kind: ConfigMap
metadata:
  name: copamundial-config
  namespace: copamundial
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  NEXTAUTH_URL: "https://copamundial.yourdomain.com"
  NEXT_PUBLIC_SITE_URL: "https://copamundial.yourdomain.com"
  SOCKET_SERVER_URL: "https://socket.copamundial.yourdomain.com"
  REDIS_URL: "redis://redis:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: copamundial-secrets
  namespace: copamundial
type: Opaque
stringData:
  # These values should be replaced with actual secrets at deployment time
  # Using placeholder values for demonstration purposes only
  # In production, use a secret manager like External Secrets or Sealed Secrets
  DATABASE_URL: ""  # Will be injected at deployment time
  NEXTAUTH_SECRET: ""  # Will be injected at deployment time
  GOOGLE_CLIENT_ID: ""  # Will be injected at deployment time
  GOOGLE_CLIENT_SECRET: ""  # Will be injected at deployment time
