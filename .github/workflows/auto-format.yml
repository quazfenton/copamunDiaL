name: 3. Auto-Format & Fix
on:
  push:
    branches-ignore: [ main ] # Don't auto-commit directly to main
jobs:
  format-code:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
      - run: npx prettier --write . || echo "Prettier failed or not configured"
      - run: npx eslint --fix . || echo "ESLint failed or not configured"
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-format and fix linting errors"
